{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Сгенерировать дайджест</h2>
  <form method="post" action="/digest">
    <div class="form-row">
      <button class="btn btn-primary" type="submit" name="period" value="24h">📅 За сутки</button>
      <button class="btn btn-outline" type="submit" name="period" value="7d">📆 За неделю</button>
    </div>
  </form>
</div>

{% if digest %}
<div class="card">
  <h2>Дайджест за {{ "сутки" if period == "24h" else "неделю" }}</h2>
  <div id="digest-out"></div>
  <script>
    (function() {
      var raw = {{ digest | tojson }};
      var out = document.getElementById("digest-out");
      // Simple markdown renderer without CDN
      var html = raw
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/^#{3} (.+)$/gm, "<h3>$1</h3>")
        .replace(/^#{2} (.+)$/gm, "<h2>$1</h2>")
        .replace(/^# (.+)$/gm,   "<h1>$1</h1>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g,     "<em>$1</em>")
        .replace(/^[-*] (.+)$/gm,  "<li>$1</li>")
        .replace(/(<li>.*<\/li>\n?)+/g, function(m){ return "<ul>"+m+"</ul>"; })
        .replace(/\n{2,}/g, "</p><p>")
        .replace(/\n/g, "<br>");
      out.innerHTML = "<p>" + html + "</p>";
    })();
  </script>
</div>
{% endif %}

{% endblock %}
