<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digest Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #f0f2f5; color: #1a1a1a; font-size: 15px; line-height: 1.6; }

    /* Nav */
    nav { background: #1e1e2e; padding: 0 24px; display: flex; align-items: center;
          gap: 32px; height: 54px; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    nav .brand { color: #fff; font-weight: 700; font-size: 16px; text-decoration: none; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; padding: 4px 0;
            border-bottom: 2px solid transparent; transition: color .15s; }
    nav a:hover, nav a.active { color: #fff; border-bottom-color: #6c8fff; }

    /* Layout */
    .page { max-width: 860px; margin: 32px auto; padding: 0 16px; }

    /* Card */
    .card { background: #fff; border-radius: 10px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 20px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #333; }

    /* Buttons */
    .btn { display: inline-block; padding: 8px 18px; border-radius: 7px; border: none;
           font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none;
           transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-outline { background: #fff; color: #4f6ef7; border: 1.5px solid #4f6ef7; }
    .btn-danger  { background: #e53e3e; color: #fff; font-size: 13px; padding: 5px 12px; }

    /* Form row */
    .form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input[type=text], input[type=number] {
      padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 7px;
      font-size: 14px; outline: none; flex: 1; min-width: 0; }
    input:focus { border-color: #4f6ef7; }
    .hint { font-size: 12px; color: #888; margin-top: 6px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 8px 12px; color: #777; font-weight: 500;
         border-bottom: 1.5px solid #eee; font-size: 13px; }
    td { padding: 10px 12px; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .muted { color: #888; font-size: 13px; }
    .mono { font-family: monospace; }
    a { color: #4f6ef7; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Alert */
    .alert { background: #ebfaf2; border: 1px solid #6fcf97; color: #276749;
             padding: 10px 16px; border-radius: 7px; margin-bottom: 16px; font-size: 14px; }

    /* Badge */
    .badge { background: #eee; color: #555; font-size: 12px; font-weight: 600;
             padding: 2px 8px; border-radius: 20px; margin-left: 6px; }

    /* Digest output */
    #digest-out { line-height: 1.75; }
    #digest-out h1,#digest-out h2,#digest-out h3 { margin: 18px 0 8px; font-size: 15px; }
    #digest-out p  { margin-bottom: 8px; }
    #digest-out ul,#digest-out ol { padding-left: 20px; margin-bottom: 8px; }
    #digest-out li { margin-bottom: 4px; }
    #digest-out pre { background:#f5f5f5; padding:10px; border-radius:6px; overflow-x:auto; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">📰 Digest Bot</a>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Дайджест</a>
    <a href="/channels" {% if request.url.path.startswith("/channels") %}class="active"{% endif %}>Каналы</a>
    <a href="/users" {% if request.url.path.startswith("/users") %}class="active"{% endif %}>Пользователи</a>
  </nav>
  <div class="page">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
