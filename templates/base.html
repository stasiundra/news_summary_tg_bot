<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digest Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .digest-output { white-space: pre-wrap; line-height: 1.7; font-size: .95rem; }
    .badge-channel { font-size: .8rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">📰 Digest Bot</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Дайджест</a>
        <a class="nav-link {% if request.url.path.startswith('/channels') %}active{% endif %}" href="/channels">Каналы</a>
        <a class="nav-link {% if request.url.path.startswith('/users') %}active{% endif %}" href="/users">Пользователи</a>
      </div>
    </div>
  </nav>
  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
